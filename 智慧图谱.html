<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧煤化工知识图谱</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #04111f;
      --panel: rgba(7, 23, 43, .86);
      --panel-strong: rgba(9, 31, 59, .94);
      --text: #dcefff;
      --muted: #94b8d0;
      --cyan: #22d3ee;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
    }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 0%, rgba(34, 211, 238, .18), transparent 30%),
        radial-gradient(circle at 84% 12%, rgba(34, 197, 94, .12), transparent 34%),
        linear-gradient(180deg, #07192c 0%, var(--bg) 48%, #020817 100%);
      min-height: 100vh;
    }
    header {
      min-height: 245px;
      padding: 40px 6vw 28px;
      color: #fff;
      background:
        linear-gradient(90deg, rgba(3, 12, 25, .95), rgba(8, 33, 61, .8), rgba(15, 118, 110, .25)),
        url("assets/coal-chemical-hero.png") center/cover;
      display: flex;
      align-items: end;
      position: relative;
      overflow: hidden;
    }
    header::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(125, 211, 252, .08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(125, 211, 252, .08) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(90deg, rgba(0,0,0,.75), transparent 78%);
      pointer-events: none;
    }
    .hero {
      max-width: 980px;
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      display: inline-flex;
      padding: 7px 12px;
      border: 1px solid rgba(125, 211, 252, .5);
      border-radius: 999px;
      background: rgba(14, 116, 144, .28);
      color: #bae6fd;
      font-size: 14px;
      letter-spacing: 0;
    }
    h1 {
      margin: 18px 0 12px;
      font-size: clamp(34px, 5.4vw, 62px);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 0 24px rgba(34, 211, 238, .3);
    }
    .lead {
      max-width: 860px;
      margin: 0;
      font-size: 18px;
      line-height: 1.75;
      color: rgba(226, 246, 255, .9);
    }
    main { padding: 24px 0 58px; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin: 0 6vw 16px;
      color: var(--muted);
      line-height: 1.65;
    }
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 14px;
    }
    .stat {
      border: 1px solid rgba(125, 211, 252, .2);
      border-radius: 8px;
      padding: 7px 10px;
      background: rgba(8, 47, 73, .42);
      color: #ccecff;
      text-decoration: none;
    }
    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid rgba(125, 211, 252, .24);
      border-radius: 999px;
      background: rgba(8, 47, 73, .56);
      color: #c9efff;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
    }
    button.tag { appearance: none; }
    .tag:hover,
    .tag.active {
      border-color: rgba(103, 232, 249, .78);
      background: rgba(14, 116, 144, .76);
      color: #f0fbff;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--color);
      box-shadow: 0 0 12px var(--color);
      flex: 0 0 auto;
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 420px);
      gap: 18px;
      align-items: start;
      margin: 0 6vw;
    }
    .network-panel {
      width: 100%;
      min-height: 780px;
      overflow: visible;
      position: relative;
      border: 1px solid rgba(125, 211, 252, .18);
      border-radius: 8px;
      background: rgba(3, 19, 37, .32);
    }
    .network-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(56, 189, 248, .08) 45%, transparent 70%);
      transform: translateX(-70%);
      animation: scan 7s linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes scan { to { transform: translateX(70%); } }
    svg {
      display: block;
      width: 100%;
      height: 780px;
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 48%, rgba(14, 165, 233, .22), transparent 22%),
        radial-gradient(circle at 50% 48%, rgba(34, 197, 94, .12), transparent 48%),
        linear-gradient(rgba(56, 189, 248, .08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 189, 248, .08) 1px, transparent 1px),
        #06182c;
      background-size: auto, auto, 38px 38px, 38px 38px, auto;
    }
    .link {
      stroke: rgba(125, 211, 252, .46);
      stroke-width: 1.6;
      stroke-linecap: round;
      opacity: .58;
    }
    .link.strong {
      stroke: #22d3ee;
      stroke-width: 2.7;
      opacity: .86;
    }
    .link.cross {
      stroke: rgba(34, 197, 94, .68);
      stroke-dasharray: 8 7;
    }
    .link.focused {
      stroke: #67e8f9;
      stroke-width: 3;
      opacity: .96;
      filter: drop-shadow(0 0 7px rgba(103, 232, 249, .72));
    }
    .link.muted { opacity: .14; stroke-width: 1.1; }
    .link-label {
      fill: #aeeaff;
      stroke: #06182c;
      stroke-width: 3px;
      paint-order: stroke;
      font-size: 11px;
      text-anchor: middle;
      dominant-baseline: middle;
      opacity: .66;
      pointer-events: none;
      letter-spacing: 0;
    }
    .link-label.strong { fill: #67e8f9; opacity: .86; }
    .link-label.cross { fill: #86efac; }
    .link-label.focused { opacity: .98; font-weight: 700; }
    .link-label.muted { opacity: .12; }
    .node { cursor: pointer; }
    .node-body {
      transition: transform .18s ease, opacity .18s ease, filter .18s ease;
      transform-box: fill-box;
      transform-origin: center;
    }
    .node rect {
      fill: var(--fill);
      stroke: rgba(226, 246, 255, .88);
      stroke-width: 1.75;
      filter: drop-shadow(0 0 12px rgba(56, 189, 248, .22));
    }
    .node text {
      pointer-events: none;
      fill: #eaf8ff;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      font-size: 13px;
      letter-spacing: 0;
    }
    .node.core text { font-size: 18px; }
    .node.branch text { font-size: 15px; }
    .node.dim .node-body { opacity: .34; }
    .node.active .node-body,
    .node:hover .node-body {
      transform: scale(1.08);
      opacity: 1;
      filter: drop-shadow(0 0 16px rgba(34, 211, 238, .62));
    }
    .node.active rect {
      stroke: #e0f7ff;
      stroke-width: 2.6;
    }
    .detail-panel {
      position: sticky;
      top: 18px;
      z-index: 2;
      width: 100%;
      max-height: 780px;
      overflow: auto;
      padding: 22px;
      border: 1px solid rgba(125, 211, 252, .22);
      border-radius: 8px;
      background: rgba(9, 31, 59, .72);
      box-shadow: 0 20px 48px rgba(2, 132, 199, .16), inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter: blur(12px);
    }
    .detail-panel h2 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.22;
      color: #f0fbff;
    }
    .type {
      display: inline-flex;
      margin-bottom: 15px;
      padding: 6px 10px;
      border: 1px solid color-mix(in srgb, var(--type-color) 70%, white 10%);
      border-radius: 999px;
      background: color-mix(in srgb, var(--type-color) 22%, transparent);
      color: #dff8ff;
      font-size: 14px;
    }
    .detail-panel p {
      margin: 0 0 16px;
      color: #bddbef;
      line-height: 1.82;
    }
    .detail-panel h3 {
      margin: 22px 0 10px;
      font-size: 18px;
      color: #e7f8ff;
    }
    .detail-panel ul {
      margin: 0;
      padding-left: 20px;
      color: #bddbef;
      line-height: 1.86;
    }
    .relation-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 4px;
    }
    .relation-chip {
      border: 1px solid rgba(125, 211, 252, .32);
      background: rgba(8, 47, 73, .75);
      color: #d7f5ff;
      padding: 7px 9px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .relation-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(103, 232, 249, .76);
      background: rgba(14, 116, 144, .82);
    }
    .reference-list {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    .reference-card {
      padding: 11px 12px;
      border: 1px solid rgba(125, 211, 252, .24);
      border-radius: 8px;
      background: rgba(3, 19, 37, .52);
    }
    .reference-title {
      margin: 0 0 6px;
      color: #e8f8ff;
      font-size: 14px;
      line-height: 1.55;
    }
    .reference-meta {
      color: #91b7d2;
      font-size: 13px;
      line-height: 1.55;
    }
    .reference-path {
      margin-top: 7px;
      color: #7fb0ca;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-all;
    }
    .reference-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .reference-actions a,
    .reference-actions button {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 9px;
      border: 1px solid rgba(103, 232, 249, .34);
      border-radius: 8px;
      color: #d7f5ff;
      background: rgba(14, 116, 144, .36);
      text-decoration: none;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .reference-actions a:hover,
    .reference-actions button:hover {
      border-color: rgba(103, 232, 249, .8);
      background: rgba(14, 116, 144, .76);
    }
    .collection {
      margin: 28px 6vw 0;
      border: 1px solid rgba(125, 211, 252, .18);
      border-radius: 8px;
      background: rgba(3, 19, 37, .38);
      overflow: hidden;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      padding: 20px 22px 14px;
      border-bottom: 1px solid rgba(125, 211, 252, .16);
    }
    .section-head h2 {
      margin: 0 0 6px;
      font-size: 24px;
      color: #f0fbff;
    }
    .section-head p {
      margin: 0;
      color: #a9cce1;
      line-height: 1.65;
    }
    .collection-layout {
      display: grid;
      grid-template-columns: minmax(310px, 420px) minmax(0, 1fr);
      min-height: 620px;
    }
    .collection-list {
      max-height: 680px;
      overflow: auto;
      padding: 14px;
      border-right: 1px solid rgba(125, 211, 252, .16);
    }
    .collection-card {
      width: 100%;
      margin: 0 0 10px;
      padding: 12px;
      border: 1px solid rgba(125, 211, 252, .22);
      border-radius: 8px;
      background: rgba(7, 23, 43, .72);
      color: inherit;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
    }
    .collection-card:hover,
    .collection-card.active {
      border-color: rgba(103, 232, 249, .72);
      background: rgba(14, 116, 144, .44);
    }
    .collection-title {
      margin: 0 0 8px;
      color: #e8f8ff;
      font-size: 14px;
      line-height: 1.55;
    }
    .collection-meta {
      color: #91b7d2;
      font-size: 13px;
      line-height: 1.5;
    }
    .viewer-panel {
      min-height: 680px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: rgba(2, 8, 23, .48);
    }
    .viewer-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(125, 211, 252, .16);
    }
    .viewer-title {
      min-width: 0;
      color: #e8f8ff;
      line-height: 1.45;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pdf-frame {
      width: 100%;
      height: 100%;
      min-height: 620px;
      border: 0;
      background: #0f172a;
    }
    .notice {
      margin-top: 18px;
      padding: 12px 14px;
      border-left: 4px solid #22d3ee;
      background: rgba(8, 47, 73, .55);
      color: #cdefff;
      line-height: 1.7;
    }
    footer {
      padding: 24px 6vw;
      background: #020817;
      color: #9bc5df;
      line-height: 1.75;
      border-top: 1px solid rgba(125, 211, 252, .16);
    }
    @media (max-width: 1080px) {
      header { min-height: 230px; padding: 34px 22px 28px; }
      main { padding: 22px 0 44px; }
      .toolbar { display: block; margin: 0 18px 14px; }
      .legend { justify-content: flex-start; margin-top: 12px; }
      .workspace { display: block; margin: 0 18px; }
      .network-panel { min-height: 720px; margin-bottom: 16px; }
      svg { height: 720px; }
      .detail-panel {
        position: relative;
        top: auto;
        width: auto;
        max-height: none;
        margin: 0;
      }
      .collection { margin: 22px 18px 0; }
      .section-head { display: block; }
      .section-head .legend { margin-top: 12px; }
      .collection-layout { display: block; }
      .collection-list { max-height: 360px; border-right: 0; border-bottom: 1px solid rgba(125, 211, 252, .16); }
    }
  </style>
</head>
<body>
  <header>
    <div class="hero">
      <span class="eyebrow">Coal Chemical Industry Knowledge Graph</span>
      <h1>智慧煤化工知识图谱</h1>
      <p class="lead">以煤化工为总纲，将煤化工重大项目、煤焦化、煤气化、煤液化并列纳入“煤化工包含内容”；并依据四个压缩包文献题名检索，补入废水零排放、绿氢耦合、VOCs、细渣资源化、胶质体、直接液化、供氢溶剂、沥青基材料等遗漏关键词。</p>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div class="stats" aria-label="文献来源统计">
        <span class="stat">煤化工重大项目：90 篇</span>
        <span class="stat">煤焦化：88 篇</span>
        <span class="stat">煤气化：109 篇</span>
        <span class="stat">煤液化：102 篇</span>
        <a class="stat" href="literature.html" target="_blank" rel="noopener">打开全量文献库</a>
      </div>
      <div class="legend" aria-label="节点类型筛选">
        <button class="tag" type="button" data-filter="all"><span class="dot" style="--color:#0ea5e9"></span>全部</button>
        <button class="tag" type="button" data-filter="重大项目"><span class="dot" style="--color:#22c55e"></span>重大项目</button>
        <button class="tag" type="button" data-filter="煤气化"><span class="dot" style="--color:#38bdf8"></span>煤气化</button>
        <button class="tag" type="button" data-filter="煤焦化"><span class="dot" style="--color:#f59e0b"></span>煤焦化</button>
        <button class="tag" type="button" data-filter="煤液化"><span class="dot" style="--color:#a78bfa"></span>煤液化</button>
        <button class="tag" type="button" data-filter="共性支撑"><span class="dot" style="--color:#ef4444"></span>共性支撑</button>
      </div>
    </div>

    <section class="workspace">
      <div class="network-panel">
        <svg viewBox="0 0 1500 860" role="img" aria-label="智慧煤化工知识图谱">
          <g id="links"></g>
          <g id="nodes"></g>
        </svg>
      </div>

      <aside class="detail-panel" id="detail"></aside>
    </section>

    <section class="collection" id="literature">
      <div class="section-head">
        <div>
          <h2>文献收录与网页预览</h2>
          <p id="collectionHint">点击关键词后，这里只展示与当前关键词相关的 PDF 文献；可在右侧直接预览，也可新窗口打开原文。</p>
        </div>
        <div class="legend" aria-label="文献收录筛选">
          <button class="tag active" type="button" data-ref-filter="all"><span class="dot" style="--color:#0ea5e9"></span>全部</button>
          <button class="tag" type="button" data-ref-filter="煤化工重大项目"><span class="dot" style="--color:#22c55e"></span>重大项目</button>
          <button class="tag" type="button" data-ref-filter="煤气化"><span class="dot" style="--color:#38bdf8"></span>煤气化</button>
          <button class="tag" type="button" data-ref-filter="煤焦化"><span class="dot" style="--color:#f59e0b"></span>煤焦化</button>
          <button class="tag" type="button" data-ref-filter="煤液化"><span class="dot" style="--color:#a78bfa"></span>煤液化</button>
        </div>
      </div>
      <div class="collection-layout">
        <div class="collection-list" id="collectionList"></div>
        <div class="viewer-panel">
          <div class="viewer-toolbar">
            <div class="viewer-title" id="viewerTitle">选择一篇文献进行预览</div>
            <div class="reference-actions">
              <a id="viewerOpen" href="#" target="_blank" rel="noopener">新窗口打开</a>
            </div>
          </div>
          <iframe class="pdf-frame" id="pdfFrame" title="文献 PDF 预览"></iframe>
        </div>
      </div>
    </section>
  </main>

  <script src="文献收录/full-literature-data.js"></script>
  <script>
    const archiveSources = {
      "煤化工重大项目": "煤化工重大项目文献包",
      "煤焦化": "煤焦化文献包",
      "煤气化": "煤气化文献包",
      "煤液化": "煤液化文献包"
    };

    const typeColors = {
      "核心": "#0ea5e9",
      "重大项目": "#22c55e",
      "煤气化": "#38bdf8",
      "煤焦化": "#f59e0b",
      "煤液化": "#a78bfa",
      "共性支撑": "#ef4444"
    };

    const references = {
      P01: ref("“十五五”我国煤化工产业发展趋势_朱彬彬.pdf", "煤化工重大项目", "产业趋势"),
      P02: ref("M公司煤化工项目绿色低碳发展影响因素研究_康秦宝.pdf", "煤化工重大项目", "项目低碳"),
      P03: ref("构建新疆煤炭煤电煤化工产业集群高质量发展新模式的思考_高金晶.pdf", "煤化工重大项目", "产业集群"),
      P04: ref("黄河几字弯区现代煤化工产业适水发展路径研究_杨玉峰.pdf", "煤化工重大项目", "适水发展"),
      P05: ref("煤化工废水零排放系统碳足迹特征分析_吴迪.pdf", "煤化工重大项目", "废水零排放"),
      P06: ref("现代煤化工反渗透浓盐水的治理研究：集中处理优势及技术挑战_张伟星.pdf", "煤化工重大项目", "浓盐水治理"),
      P07: ref("LDAR在煤化工企业VOCs管控中的应用_王斌.pdf", "煤化工重大项目", "VOCs/LDAR"),
      P08: ref("煤化工产业火灾风险特点及事故预防对策分析_李淼城.pdf", "煤化工重大项目", "安全风险"),
      P09: ref("煤化工企业MES建设实践_吴海鹏.pdf", "煤化工重大项目", "MES"),
      P10: ref("分布式控制系统在大型煤化工工厂中的应用与实践_方彪.pdf", "煤化工重大项目", "DCS"),
      P11: ref("煤化工空分深冷装置降本增效关键技术及经济效益分析_颜廷忠.pdf", "煤化工重大项目", "空分装置"),
      P12: ref("煤化工项目甲醇合成装置空冷器的布置及管线优化设计_朱彦儒.pdf", "煤化工重大项目", "甲醇装置"),
      P13: ref("绿氢耦合现代煤化工发展路径分析_王海玲.pdf", "煤化工重大项目", "绿氢耦合"),

    function sortNodesForLayout(a, b) {
      return typeOrder.indexOf(a.type) - typeOrder.indexOf(b.type) || a.id.localeCompare(b.id, "zh-CN");

    function setNodePosition(item, x, y) {
      item.x = x;

      item.element.setAttribute("transform", `translate(${x} ${y})`);

    function updateLines() {
      links.forEach(item => {
        const source = nodeById[item.source];
        const target = nodeById[item.target];
        item.element.setAttribute("x1", source.x);
        item.element.setAttribute("y1", source.y);
        item.element.setAttribute("x2", target.x);
        item.element.setAttribute("y2", target.y);
        item.labelElement.setAttribute("x", (source.x + target.x) / 2);
        item.labelElement.setAttribute("y", (source.y + target.y) / 2);
      });

    function distributeByRings(list, rings, startAngle = -Math.PI / 2) {
      const targets = {};
      let offset = 0;
      rings.forEach((ring, ringIndex) => {
        const slice = list.slice(offset, offset + ring.count);
        const total = Math.max(slice.length, 1);
        slice.forEach((item, index) => {
          const angle = startAngle + ring.shift + (Math.PI * 2 * index) / total;
          targets[item.id] = {
            x: CENTER.x + Math.cos(angle) * ring.rx,
            y: CENTER.y + Math.sin(angle) * ring.ry
          };
        });
        offset += ring.count;

        if (ringIndex === rings.length - 1) {
          const rest = list.slice(offset);
          rest.forEach((item, index) => {
            const angle = startAngle + ring.shift + .11 + (Math.PI * 2 * index) / Math.max(rest.length, 1);
            targets[item.id] = {
              x: CENTER.x + Math.cos(angle) * ring.rx,
              y: CENTER.y + Math.sin(angle) * ring.ry
            };
          });
        }
      });
      return targets;
    }

    function focusTargets(selected) {
      const neighborIds = adjacency.get(selected.id);
      const near = nodes
        .filter(item => item.id !== selected.id && neighborIds.has(item.id))
        .sort(sortNodesForLayout);
      const far = nodes
        .filter(item => item.id !== selected.id && !neighborIds.has(item.id))
        .sort(sortNodesForLayout);
      return {
        [selected.id]: CENTER,
        ...distributeByRings(near, [
          { count: 14, rx: 285, ry: 205, shift: 0 },
          { count: 18, rx: 430, ry: 300, shift: .13 },
          { count: 999, rx: 555, ry: 360, shift: .24 }
        ]),
        ...distributeByRings(far, [
          { count: 28, rx: 575, ry: 360, shift: .06 },
          { count: 999, rx: 675, ry: 395, shift: .19 }
        ], -Math.PI / 2 + .07)
      };
    }

    function categoryTargets(categoryNodes, target) {
      const categoryIds = new Set(categoryNodes.map(item => item.id));
      const rest = nodes
        .filter(item => !categoryIds.has(item.id) && item.id !== target.id)
        .sort(sortNodesForLayout);
      const categoryList = categoryNodes
        .filter(item => item.id !== target.id)
        .sort(sortNodesForLayout);
      return {
        [target.id]: CENTER,
        ...distributeByRings(categoryList, [
          { count: 18, rx: 310, ry: 215, shift: 0 },
          { count: 999, rx: 455, ry: 315, shift: .16 }
        ]),
        ...distributeByRings(rest, [
          { count: 32, rx: 590, ry: 360, shift: .07 },
          { count: 999, rx: 680, ry: 395, shift: .2 }
        ], -Math.PI / 2 + .08)

    function animateLayout(targets, shouldAnimate = true) {
      if (layoutAnimation) cancelAnimationFrame(layoutAnimation);

      if (!shouldAnimate) {
        nodes.forEach(item => {
          const target = targets[item.id] || baseTargets[item.id];
          setNodePosition(item, target.x, target.y);
        });
        updateLines();
        return;
      }

      const starts = Object.fromEntries(nodes.map(item => [item.id, { x: item.x, y: item.y }]));
      const duration = 620;
      const startedAt = performance.now();
      const ease = value => 1 - Math.pow(1 - value, 3);

      function step(now) {
        const progress = Math.min((now - startedAt) / duration, 1);
        const eased = ease(progress);
        nodes.forEach(item => {
          const start = starts[item.id];
          const target = targets[item.id] || baseTargets[item.id];
          setNodePosition(
            item,
            start.x + (target.x - start.x) * eased,
            start.y + (target.y - start.y) * eased
          );
        });
        updateLines();
        if (progress < 1) {
          layoutAnimation = requestAnimationFrame(step);
        } else {
          layoutAnimation = null;
        }
      }

      layoutAnimation = requestAnimationFrame(step);
    }

      const latin = (text.match(/[A-Za-z]/g) || []).length;

      let surname = "";
      let given = "";
      if (surnamePinyin[twoCharSurname]) {

        given = clean.slice(2);

        given = clean.slice(1);

      return givenPinyin ? `${givenPinyin} ${surname}` : surname;

      const title = match[1]
        .replace(/_+$/g, "")
        .replace(/_*(本报记者|记者|整理|讲述人|证券时报记者|新疆日报记者)_*$/g, "");
      const authorTail = match[2].replace(/\s*[（(]\d+[）)]$/g, "");
      const authors = normalizeAuthors(authorTail, latinDominant(title));
      return authors ? { title, authors } : { title: cleaned, authors: "" };
    }

    function cleanForeignTitle(base) {
      return base
        .replace(/[_-]?(19|20)\d{2}[_-].*$/i, "")
        .replace(/[_-]main$/i, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function trustedDisplayTitle(refItem) {
      const text = String(refItem.displayTitle || "").replace(/\s+/g, " ").trim();
      const badMeta = /(Microsoft\s+Word|DSI\s+Equation\s+Image|cite_this_logo|src\.eps|\.eps\b|\.docx\b|^tx\d*\b)/i;
      const signal = (text.match(/[A-Za-z\u4e00-\u9fff]/g) || []).length;
      if (!text || text.length < 10 || text.length > 260) return "";
      if (/[\x00-\x08\x0B\x0C\x0E-\x1F]/.test(text) || badMeta.test(text)) return "";
      return signal >= Math.max(8, Math.floor(text.length * 0.35)) ? text : "";
    }

    function formatReferenceTitle(refItem) {
      const metadataTitle = trustedDisplayTitle(refItem);
      if (metadataTitle) return metadataTitle;
      const base = refItem.file
        .replace(/\.(pdf|caj)$/i, "")
        .replace(/\s*[（(]\d+[）)]$/g, "")
        .trim();
      const parsed = splitChineseTitleAndAuthors(base);
      const title = hasChinese(parsed.title) ? parsed.title : cleanForeignTitle(parsed.title);
      return parsed.authors ? `${title} ${parsed.authors}` : title;
    }

    function cleanTitle(file) {
      return file.replace(/\.pdf$/i, "").replace(/\.caj$/i, "");
    }

    function referenceCards(item) {
      return refsForNode(item).map(refItem => `
        <article class="reference-card">
          <p class="reference-title">${formatReferenceTitle(refItem)}</p>
          <div class="reference-meta">${refItem.archive} · ${refItem.topic}</div>
          <div class="reference-path">${refItem.path}</div>
          <div class="reference-actions">
            <button type="button" data-ref="${refItem.id}">页内查看</button>
            <a href="${localPdfHref(refItem)}" target="_blank" rel="noopener">新窗口打开</a>
          </div>
        </article>
      `).join("");
    }

    function focusNode(id, shouldAnimate = true) {
      const selected = nodeById[id];
      const neighbors = adjacency.get(id);
      nodes.forEach(item => {
        const focused = item.id === id;
        const related = neighbors.has(item.id);
        item.element.classList.toggle("active", focused);
        item.element.classList.toggle("dim", !focused && !related);
      });
      links.forEach(item => {
        const focused = item.source === id || item.target === id;
        item.element.classList.toggle("focused", focused);
        item.element.classList.toggle("muted", !focused);
        item.labelElement.classList.toggle("focused", focused);
        item.labelElement.classList.toggle("muted", !focused);
      });
      document.querySelectorAll("[data-filter]").forEach(button => button.classList.toggle("active", false));
      renderDetail(selected);
      setCollectionSource(selected);
      animateLayout(focusTargets(selected), shouldAnimate);
    }

    function renderDetail(item) {
      detail.innerHTML = `
        <span class="type" style="--type-color:${item.color}">${item.type}</span>
        <h2>${item.id}</h2>
        <p>${item.desc}</p>
        <h3>关联关键词 · ${adjacency.get(item.id).size} 个</h3>
        <div class="relation-list">${relationButtons(item)}</div>
        <h3>检索补入依据</h3>
        <ul>${item.points.map(point => `<li>${point}</li>`).join("")}</ul>
        <h3>压缩包文献引用</h3>
        <div class="reference-list">${referenceCards(item)}</div>
        <div class="notice">引用来自本地压缩包目录，并已抽取为页面旁的 PDF 预览文件。点击“页内查看”会跳转到下方收录区。</div>
      `;
    }

    function setActiveRefFilter(value = "all") {
      refFilters.forEach(item => item.classList.toggle("active", item.dataset.refFilter === value));
    }

    function setCollectionSource(item, filter = "all") {
      currentCollectionTitle = item.id;
      currentCollectionRefs = refsForNode(item);
      setActiveRefFilter(filter);
      renderCollection(filter);
    }

    function renderCollection(filter = "all") {
      const list = filter === "all"
        ? currentCollectionRefs
        : currentCollectionRefs.filter(item => item.archive === filter);
      collectionHint.textContent = `当前关键词：${currentCollectionTitle}。左侧仅显示该关键词相关文献，共 ${list.length} 篇。`;
      if (!list.length) {
        collectionList.innerHTML = `<div class="notice">当前关键词在该筛选条件下暂无相关文献。</div>`;
        pdfFrame.removeAttribute("src");
        viewerOpen.removeAttribute("href");
        viewerTitle.textContent = "当前筛选下暂无可预览文献";
        return;
      }
      collectionList.innerHTML = list.map(item => `
        <button class="collection-card" type="button" data-ref="${item.id}">
          <p class="collection-title">${formatReferenceTitle(item)}</p>
          <div class="collection-meta">${item.archive} · ${item.topic}</div>
        </button>
      `).join("");
      showReference(list[0].id, false);
    }

    function showReference(refId, shouldScroll = true) {
      const refItem = allReferences.find(item => item.id === refId);
      if (!refItem) return;
      const href = localPdfHref(refItem);
      viewerOpen.href = href;
      if (refItem.ext && refItem.ext !== "pdf") {
        pdfFrame.removeAttribute("src");
        viewerTitle.textContent = `${refItem.archive} · ${formatReferenceTitle(refItem)}（${refItem.ext.toUpperCase()} 文件请新窗口打开）`;
      } else {
        pdfFrame.src = href;
        viewerTitle.textContent = `${refItem.archive} · ${formatReferenceTitle(refItem)}`;
      }
      document.querySelectorAll("[data-ref]").forEach(item => {
        item.classList.toggle("active", item.dataset.ref === refId);
      });
      if (shouldScroll) {
        document.querySelector("#literature").scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    function filterType(type) {
      document.querySelectorAll("[data-filter]").forEach(button => {
        button.classList.toggle("active", button.dataset.filter === type);
      });
      if (type === "all") {
        focusNode("煤化工");
        return;
      }

      const visible = new Set(nodes.filter(item => item.type === type || item.id === type).map(item => item.id));
      const target = nodeById[type] || (type === "重大项目" ? nodeById["煤化工重大项目"] : nodes.find(item => item.type === type));
      nodes.forEach(item => {
        const keep = visible.has(item.id) || item.type === "核心";
        item.element.classList.toggle("dim", !keep);
        item.element.classList.toggle("active", item.id === target.id);
      });
      links.forEach(item => {
        const keep = visible.has(item.source) || visible.has(item.target);
        item.element.classList.toggle("muted", !keep);
        item.element.classList.toggle("focused", visible.has(item.source) && visible.has(item.target));
        item.labelElement.classList.toggle("muted", !keep);
        item.labelElement.classList.toggle("focused", visible.has(item.source) && visible.has(item.target));
      });
      renderDetail(target);
      setCollectionSource(target);
      animateLayout(categoryTargets(nodes.filter(item => visible.has(item.id)), target));
    }

    detail.addEventListener("click", event => {
      const refButton = event.target.closest("[data-ref]");
      if (refButton) {
        showReference(refButton.dataset.ref);
        return;
      }
      const button = event.target.closest("[data-node]");
      if (!button) return;
      focusNode(button.dataset.node);
    });

    legend.addEventListener("click", event => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;
      filterType(button.dataset.filter);
    });

    collectionList.addEventListener("click", event => {
      const button = event.target.closest("[data-ref]");
      if (!button) return;
      showReference(button.dataset.ref, false);
    });

    refFilters.forEach(button => {
      button.addEventListener("click", () => {
        setActiveRefFilter(button.dataset.refFilter);
        renderCollection(button.dataset.refFilter);
      });
    });

    const requestedNode = new URLSearchParams(window.location.search).get("node") || decodeURIComponent(window.location.hash.replace(/^#/, ""));
    focusNode(nodeById[requestedNode] ? requestedNode : "煤化工", false);
  </script>
</body>
</html>
