  let pdfFiles = pdfText
    .split("\n")
    .map(item => item.trim())
    .filter(item => item.endsWith(".pdf"));

  let currentPdfCategory = "ALL";

  const pdfList = document.getElementById("pdfList");
  const pdfViewer = document.getElementById("pdfViewer");
  const pdfTitle = document.getElementById("pdfTitle");
  const pdfSearch = document.getElementById("pdfSearch");
  const pdfCount = document.getElementById("pdfCount");

  function getPdfUrl(fileName) {
    return pdfBaseUrl + encodeURIComponent(fileName);
  }

  function previewPdf(fileName) {
    const url = getPdfUrl(fileName);
    pdfViewer.src = url;
    pdfTitle.textContent = fileName;
  }

  function renderPdfList(files) {
    pdfList.innerHTML = "";
    pdfCount.textContent = "当前显示：" + files.length + " 篇文献";

    if (files.length === 0) {
      pdfList.innerHTML = "<p style='color:#999;'>没有找到匹配的文献。</p>";
      pdfViewer.src = "";
      pdfTitle.textContent = "PDF 在线预览";
      return;
    }

    files.forEach(function(fileName, index) {
      const item = document.createElement("div");
      item.style.padding = "10px 0";
      item.style.borderBottom = "1px solid #eee";

      const title = document.createElement("a");
      title.href = "javascript:void(0)";
      title.textContent = fileName;
      title.style.display = "block";
      title.style.color = "#1f4e79";
      title.style.fontWeight = "bold";
      title.style.textDecoration = "none";
      title.style.wordBreak = "break-all";
      title.style.marginBottom = "6px";

      title.onclick = function() {
        previewPdf(fileName);
      };

      const previewBtn = document.createElement("a");
      previewBtn.href = "javascript:void(0)";
      previewBtn.textContent = "在线预览";
      previewBtn.style.display = "inline-block";
      previewBtn.style.marginRight = "8px";
      previewBtn.style.padding = "4px 9px";
      previewBtn.style.background = "#1f4e79";
      previewBtn.style.color = "#fff";
      previewBtn.style.borderRadius = "4px";
      previewBtn.style.fontSize = "13px";
      previewBtn.style.textDecoration = "none";

      previewBtn.onclick = function() {
        previewPdf(fileName);
      };

      const downloadBtn = document.createElement("a");
      downloadBtn.href = getPdfUrl(fileName);
      downloadBtn.textContent = "下载 PDF";
      downloadBtn.target = "_blank";
      downloadBtn.download = fileName;
      downloadBtn.style.display = "inline-block";
      downloadBtn.style.padding = "4px 9px";
      downloadBtn.style.background = "#0a7c3f";
      downloadBtn.style.color = "#fff";
      downloadBtn.style.borderRadius = "4px";
      downloadBtn.style.fontSize = "13px";
      downloadBtn.style.textDecoration = "none";

      item.appendChild(title);
      item.appendChild(previewBtn);
      item.appendChild(downloadBtn);
      pdfList.appendChild(item);

      if (index === 0) {
        previewPdf(fileName);
      }
    });
  }

  function applyPdfFilters() {
    const keyword = pdfSearch.value.trim().toLowerCase();

    const filtered = pdfFiles.filter(function(fileName) {
      const matchCategory =
        currentPdfCategory === "ALL" || fileName.startsWith(currentPdfCategory);

      const matchKeyword =
        fileName.toLowerCase().includes(keyword);

      return matchCategory && matchKeyword;
    });

    renderPdfList(filtered);
  }

  function filterPdfCategory(category) {
    currentPdfCategory = category;
    applyPdfFilters();
  }

  pdfSearch.addEventListener("input", applyPdfFilters);

  renderPdfList(pdfFiles);
</script>
