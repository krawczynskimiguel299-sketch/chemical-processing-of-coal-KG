    let currentCategory = "全部";
    let currentList = [...pdfData];
    let currentItem = null;

    const pdfList = document.getElementById("pdfList");
    const pdfViewer = document.getElementById("pdfViewer");
    const pdfTitle = document.getElementById("pdfTitle");
    const pdfSearch = document.getElementById("pdfSearch");
    const pdfCount = document.getElementById("pdfCount");
    const openBtn = document.getElementById("openBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const copyBtn = document.getElementById("copyBtn");
    const categoryTabs = document.getElementById("categoryTabs");

    function pdfUrl(item) {
      return pdfBaseUrl + item.file;
    }

    function escapeText(value) {
      return String(value ?? "");
    }

    function categories() {
      const set = new Set(pdfData.map(item => item.category || "其他"));
      return ["全部", ...Array.from(set).sort()];
    }

    function renderTabs() {
      categoryTabs.innerHTML = "";
      categories().forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "tab" + (cat === currentCategory ? " active" : "");
        btn.type = "button";
        btn.textContent = cat;
        btn.onclick = () => {
          currentCategory = cat;
          renderTabs();
          applyFilter();
        };
        categoryTabs.appendChild(btn);
      });
    }

    function applyFilter() {
      const kw = pdfSearch.value.trim().toLowerCase();
      currentList = pdfData.filter(item => {
        const inCat = currentCategory === "全部" || item.category === currentCategory;
        const text = [item.code, item.category, item.title, item.file].join(" ").toLowerCase();
        return inCat && text.includes(kw);
      });
      renderList(currentList);
    }

    function renderList(list) {
      pdfList.innerHTML = "";
      pdfCount.textContent = list.length + " 篇";

      if (!list.length) {
        pdfList.innerHTML = '<div class="empty">没有找到匹配的文献。</div>';
        return;
      }

      list.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "item" + (currentItem && currentItem.file === item.file ? " active" : "");
        row.innerHTML = `
          <div class="item-title">${escapeText(item.code)}｜${escapeText(item.title)}</div>
          <div class="item-meta">
            <span class="badge">${escapeText(item.category || "其他")}</span>
            <span>${escapeText(item.file)}</span>
          </div>
        `;
        row.onclick = () => selectPdf(item);
        pdfList.appendChild(row);

        if (!currentItem && index === 0) {
          selectPdf(item, false);
        }
      });
    }

    function selectPdf(item, rerender = true) {
      currentItem = item;
      const url = pdfUrl(item);
      pdfTitle.textContent = item.code + "｜" + item.title;
      pdfViewer.src = url;
      openBtn.href = url;
      downloadBtn.href = url;
      downloadBtn.setAttribute("download", item.file);
      if (rerender) renderList(currentList);
    }

    copyBtn.addEventListener("click", async () => {
      if (!currentItem) return;
      const url = pdfUrl(currentItem);
      try {
        await navigator.clipboard.writeText(url);
        copyBtn.textContent = "已复制";
        setTimeout(() => copyBtn.textContent = "复制 PDF 地址", 1200);
      } catch (e) {
        prompt("复制这个 PDF 地址：", url);
      }
    });

    pdfSearch.addEventListener("input", applyFilter);

    renderTabs();
    applyFilter();
  </script>
